<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artículos — Panel Editorial CREA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/dashboard.css">
  <script src="https://cdn.ckeditor.com/ckeditor5/41.0.0/classic/ckeditor.js"></script>
  <style>
    .editor-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
    @media (max-width: 900px) { .editor-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="dash-overlay" id="dash-overlay"></div>

  <aside class="dash-sidebar" id="dash-sidebar">
  </aside>

  <header class="dash-topbar">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <button class="dash-topbar__menu-btn" id="btn-menu" aria-label="Menú">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="dash-topbar__title">Gestor de Artículos</span>
    </div>
    <div style="display:flex;gap:0.75rem;align-items:center;">
      <button class="btn btn--primary btn--sm" onclick="showForm()">+ Nuevo Artículo</button>
    </div>
  </header>

  <main class="dash-main">
    <div class="crm-card" id="list-view">
      <div class="crm-card__header">
        <span class="crm-card__title">Todos los Artículos</span>
        <button class="btn btn--secondary btn--sm" onclick="exportArticlesCSV()">Exportar CSV</button>
      </div>
      <div style="padding:1rem 1.25rem;">
        <div class="search-bar">
          <div class="search-input-wrapper">
            <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
            <input type="text" class="search-input" id="search-input" placeholder="Buscar por título, autor, categoría...">
          </div>
          <div class="filter-group">
            <label>Estado</label>
            <select class="filter-select" id="filter-estado">
              <option value="">Todos</option>
              <option value="publicada">Publicada</option>
              <option value="borrador">Borrador</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Categoría</label>
            <select class="filter-select" id="filter-categoria">
              <option value="">Todas</option>
              <option value="local">Local</option>
              <option value="cultura">Cultura</option>
              <option value="economia">Economía</option>
              <option value="deportes">Deportes</option>
              <option value="opinion">Opinión</option>
              <option value="entretenimiento">Entretenimiento</option>
            </select>
          </div>
        </div>
      </div>
      <table class="data-table" id="articles-table">
        <thead>
          <tr>
            <th>Título</th>
            <th>Categoría</th>
            <th>Autor</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody><tr><td colspan="6" class="empty-state"><div class="spinner"></div><div style="margin-top:1rem;">Cargando...</div></td></tr></tbody>
      </table>
      <div id="pagination-container"></div>
    </div>

    <div class="crm-card" id="article-form-view" style="display:none;">
      <div class="crm-card__header">
        <span class="crm-card__title" id="form-title">Editar Artículo</span>
        <div style="display:flex;gap:0.5rem;">
          <button class="btn btn--secondary btn--sm" onclick="hideForm()">Cancelar</button>
          <button class="btn btn--success btn--sm" onclick="saveArticle()" id="btn-save-art">Guardar</button>
        </div>
      </div>
      <form id="article-form" style="padding:1.25rem;">
        <input type="hidden" id="art-id">
        <div class="editor-grid">
          <div>
            <div class="form-group">
              <label>Título *</label>
              <input type="text" id="art-titulo" required maxlength="200">
            </div>
            <div class="form-group">
              <label>Subtítulo / Bajada</label>
              <input type="text" id="art-subtitulo" maxlength="300">
            </div>
            <div class="form-group">
              <label>Contenido *</label>
              <textarea id="art-contenido"></textarea>
            </div>
          </div>
          <div>
            <div class="form-group">
              <label>Estado</label>
              <select id="art-estado">
                <option value="borrador">Borrador</option>
                <option value="publicada">Publicada</option>
              </select>
            </div>
            <div class="form-group">
              <label>Categoría</label>
              <select id="art-categoria">
                <option value="local">Local</option>
                <option value="cultura">Cultura</option>
                <option value="economia">Economía</option>
                <option value="deportes">Deportes</option>
                <option value="opinion">Opinión</option>
                <option value="entretenimiento">Entretenimiento</option>
              </select>
            </div>
            <div class="form-group">
              <label>Autor</label>
              <input type="text" id="art-autor" maxlength="100">
            </div>
            <div class="form-group">
              <label>URL Imagen Destacada</label>
              <input type="url" id="art-imagen" placeholder="https://...">
            </div>
            <div class="form-group">
              <label>Meta Descripción (SEO)</label>
              <input type="text" id="art-meta-desc" maxlength="160">
            </div>
          </div>
        </div>
      </form>
    </div>
  </main>  <script src="/admin/js/sidebar.js"></script>


  <script src="/admin/js/session-guard.js"></script>
  <script>
    const API = '/api/articles/crud.php';
    let editorInstance;
    let articles = [];
    let currentPage = 1;
    const pageSize = 15;

    ClassicEditor.create(document.querySelector('#art-contenido')).then(editor => { editorInstance = editor; }).catch(error => console.error(error));

    function getFilteredArticles() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const estado = document.getElementById('filter-estado').value;
      const categoria = document.getElementById('filter-categoria').value;
      return articles.filter(a => {
        if (search && !(a.titulo || '').toLowerCase().includes(search) && !(a.autor || '').toLowerCase().includes(search)) return false;
        if (estado && a.estado !== estado) return false;
        if (categoria && a.categoria !== categoria) return false;
        return true;
      });
    }

    function renderTable() {
      const tbody = document.querySelector('#articles-table tbody');
      const filtered = getFilteredArticles();
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><div class="empty-state__icon">📝</div><div class="empty-state__text">No hay artículos</div></td></tr>';
        CreaCRM.pagination.createPagination(document.getElementById('pagination-container'), 0, 1, pageSize, () => {});
        return;
      }
      const totalPages = Math.ceil(filtered.length / pageSize);
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * pageSize;
      const pageItems = filtered.slice(start, start + pageSize);

      tbody.innerHTML = pageItems.map(art => `
        <tr>
          <td style="font-weight:500;">${CreaCRM.ui.escapeHtml(art.titulo)}</td>
          <td><span class="dash-badge" style="background:#eff6ff;color:#1e40af;">${art.categoria || '—'}</span></td>
          <td>${CreaCRM.ui.escapeHtml(art.autor || '—')}</td>
          <td><span class="dash-badge dash-badge--${art.estado === 'publicada' ? 'published' : 'draft'}">${art.estado}</span></td>
          <td>${CreaCRM.ui.formatDate(art.fecha_publicacion || art.created_at)}</td>
          <td>
            <div style="display:flex;gap:0.5rem;">
              <button class="btn btn--secondary btn--sm" onclick="editArticle('${art.id}')">Editar</button>
              <button class="btn btn--danger btn--sm" onclick="deleteArticle('${art.id}')">Eliminar</button>
            </div>
          </td>
        </tr>
      `).join('');

      CreaCRM.pagination.createPagination(document.getElementById('pagination-container'), filtered.length, currentPage, pageSize, (page) => {
        currentPage = page;
        renderTable();
      });
    }

    function showForm(art = null) {
      document.getElementById('list-view').style.display = 'none';
      document.getElementById('article-form-view').style.display = 'block';
      if (art) {
        document.getElementById('form-title').textContent = 'Editar Artículo';
        document.getElementById('art-id').value = art.id;
        document.getElementById('art-titulo').value = art.titulo || '';
        document.getElementById('art-subtitulo').value = art.subtitulo || art.extracto || '';
        document.getElementById('art-estado').value = art.estado || 'borrador';
        document.getElementById('art-categoria').value = art.categoria || 'local';
        document.getElementById('art-autor').value = art.autor || '';
        document.getElementById('art-imagen').value = art.imagen_destacada || '';
        document.getElementById('art-meta-desc').value = art.meta_description || '';
        if(editorInstance) editorInstance.setData(art.contenido_html || '');
      } else {
        document.getElementById('form-title').textContent = 'Nuevo Artículo';
        document.getElementById('article-form').reset();
        document.getElementById('art-id').value = '';
        if(editorInstance) editorInstance.setData('');
      }
    }

    function hideForm() {
      document.getElementById('list-view').style.display = 'block';
      document.getElementById('article-form-view').style.display = 'none';
    }

    function editArticle(id) {
      const art = articles.find(a => a.id === id);
      if (art) showForm(art);
    }

    async function deleteArticle(id) {
      if (!confirm('¿Eliminar este artículo?')) return;
      try {
        await CreaCRM.api.apiFetch(`${API}?id=${id}`, { method: 'DELETE' });
        CreaCRM.ui.showToast('Artículo eliminado', 'ok');
        await loadArticles();
      } catch (e) { CreaCRM.ui.showToast('Error al eliminar', 'err'); }
    }

    async function saveArticle() {
      const titulo = document.getElementById('art-titulo').value.trim();
      if (!titulo) { CreaCRM.ui.showToast('El título es requerido', 'err'); return; }

      const btn = document.getElementById('btn-save-art');
      btn.disabled = true; btn.textContent = 'Guardando...';

      const id = document.getElementById('art-id').value;
      const payload = {
        id: id || undefined,
        titulo,
        subtitulo: document.getElementById('art-subtitulo').value.trim(),
        extracto: document.getElementById('art-subtitulo').value.trim(),
        contenido_html: editorInstance ? editorInstance.getData() : '',
        autor: document.getElementById('art-autor').value.trim(),
        categoria: document.getElementById('art-categoria').value,
        imagen_destacada: document.getElementById('art-imagen').value.trim(),
        meta_description: document.getElementById('art-meta-desc').value.trim(),
        estado: document.getElementById('art-estado').value,
      };

      try {
        await CreaCRM.api.apiFetch(API, {
          method: id ? 'PATCH' : 'POST',
          body: JSON.stringify(payload)
        });
        CreaCRM.ui.showToast(id ? 'Artículo actualizado' : 'Artículo creado', 'ok');
        hideForm();
        await loadArticles();
      } catch (e) {
        CreaCRM.ui.showToast('Error al guardar', 'err');
      } finally {
        btn.disabled = false; btn.textContent = 'Guardar';
      }
    }

    async function loadArticles() {
      try {
        const res = await CreaCRM.api.apiFetch(API);
        const data = await res.json();
        articles = data.articles || [];
        currentPage = 1;
        renderTable();
      } catch (e) {
        document.querySelector('#articles-table tbody').innerHTML = '<tr><td colspan="6" class="empty-state"><div class="empty-state__icon">⚠️</div><div class="empty-state__text">Error cargando</div></td></tr>';
      }
    }

    function exportArticlesCSV() {
      const filtered = getFilteredArticles();
      if (!filtered.length) { CreaCRM.ui.showToast('No hay datos', 'err'); return; }
      const data = filtered.map(a => ({ Titulo: a.titulo || '', Categoria: a.categoria || '', Autor: a.autor || '', Estado: a.estado || '', Fecha: a.fecha_publicacion || a.created_at || '' }));
      CreaCRM.export.exportToCSV(data, 'articulos_crea');
    }

    document.getElementById('search-input').addEventListener('input', () => { currentPage = 1; renderTable(); });
    document.getElementById('filter-estado').addEventListener('change', () => { currentPage = 1; renderTable(); });
    document.getElementById('filter-categoria').addEventListener('change', () => { currentPage = 1; renderTable(); });

    CreaCRM.ui.initKeyboardShortcuts({
      'n': () => { if (document.getElementById('list-view').style.display !== 'none') showForm(); }
    });

    document.addEventListener('DOMContentLoaded', loadArticles);
  </script>
</body>
</html>
