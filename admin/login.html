<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREA Editor — Acceso</title>
  <link rel="stylesheet" href="/admin/css/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="/assets/img/public/logo-crea.png" alt="CREA" class="login-logo">
        <h1>Acceso Editorial</h1>
        <p>Plataforma de edición CREA Contenidos</p>
      </div>
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="editor@creacontenidos.com" required>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div id="login-error" class="login-error" style="display:none;"></div>
        <button type="submit" id="login-submit" class="login-submit">Ingresar al editor</button>
      </form>
      <div class="login-footer">
        <a href="/">← Volver al sitio</a>
      </div>
    </div>
  </div>
  <script src="/admin/js/auth.js"></script>
</body>
</html>
