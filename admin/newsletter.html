<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter — Panel Editorial CREA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/dashboard.css">
</head>
<body>

  <div class="dash-overlay" id="dash-overlay"></div>

  <aside class="dash-sidebar" id="dash-sidebar">
  </aside>

  <header class="dash-topbar">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <button class="dash-topbar__menu-btn" id="btn-menu" aria-label="Menú">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="dash-topbar__title">Gestor de Newsletter</span>
    </div>
    <div style="display:flex;gap:0.75rem;align-items:center;">
      <button class="btn btn--success btn--sm" onclick="exportCSV()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        Exportar CSV
      </button>
    </div>
  </header>

  <main class="dash-main">

    <div class="dash-stats">
      <div class="dash-stat-card">
        <div class="dash-stat-card__label">Total suscriptores</div>
        <div class="dash-stat-card__value" id="stat-total">0</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-card__label">Activos</div>
        <div class="dash-stat-card__value green" id="stat-activos">0</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-card__label">Inactivos</div>
        <div class="dash-stat-card__value red" id="stat-inactivos">0</div>
      </div>
    </div>

    <div class="crm-card">
      <div class="crm-card__header">
        <span class="crm-card__title">Suscriptores registrados</span>
      </div>
      <div style="padding:1rem 1.25rem;">
        <div class="search-bar">
          <div class="search-input-wrapper">
            <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
            <input type="text" class="search-input" id="search-input" placeholder="Buscar por email o WhatsApp...">
          </div>
          <div class="filter-group">
            <label>Estado</label>
            <select class="filter-select" id="filter-active">
              <option value="">Todos</option>
              <option value="true">Activos</option>
              <option value="false">Inactivos</option>
            </select>
          </div>
        </div>
      </div>
      <table class="data-table" id="subscribers-table">
        <thead>
          <tr>
            <th>Email</th>
            <th>WhatsApp</th>
            <th>Fecha suscripción</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody><tr><td colspan="4" class="empty-state"><div class="spinner"></div><div style="margin-top:1rem;">Cargando...</div></td></tr></tbody>
      </table>
      <div id="pagination-container"></div>
    </div>

  </main>  <script src="/admin/js/sidebar.js"></script>


  <script src="/admin/js/session-guard.js"></script>
  <script>
    const API = '/api/newsletter/list.php';
    let subscribers = [];
    let currentPage = 1;
    const pageSize = 15;

    function getFiltered() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const activeFilter = document.getElementById('filter-active').value;
      return subscribers.filter(s => {
        if (search && !(s.email || '').toLowerCase().includes(search) && !(s.whatsapp || '').toLowerCase().includes(search)) return false;
        if (activeFilter && String(s.active) !== activeFilter) return false;
        return true;
      });
    }

    function renderTable() {
      const tbody = document.querySelector('#subscribers-table tbody');
      const filtered = getFiltered();
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state"><div class="empty-state__icon">📧</div><div class="empty-state__text">No hay suscriptores</div></td></tr>';
        CreaCRM.pagination.createPagination(document.getElementById('pagination-container'), 0, 1, pageSize, () => {});
        return;
      }
      const totalPages = Math.ceil(filtered.length / pageSize);
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * pageSize;
      const pageItems = filtered.slice(start, start + pageSize);

      tbody.innerHTML = pageItems.map(sub => `
        <tr>
          <td style="font-weight:500;">${sub.email || '—'}</td>
          <td>${sub.whatsapp || '—'}</td>
          <td>${CreaCRM.ui.formatDate(sub.fecha_suscripcion || sub.created_at)}</td>
          <td><span class="dash-badge" style="background:${sub.active !== false ? '#d1fae5;color:#065f46' : '#fee2e2;color:#991b1b'}">${sub.active !== false ? 'Activo' : 'Inactivo'}</span></td>
        </tr>
      `).join('');

      CreaCRM.pagination.createPagination(document.getElementById('pagination-container'), filtered.length, currentPage, pageSize, (page) => {
        currentPage = page; renderTable();
      });
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = subscribers.length;
      document.getElementById('stat-activos').textContent = subscribers.filter(s => s.active === true).length;
      document.getElementById('stat-inactivos').textContent = subscribers.filter(s => s.active === false).length;
    }

    async function loadSubscribers() {
      try {
        const res = await CreaCRM.api.apiFetch(API);
        const data = await res.json();
        subscribers = data.subscribers || [];
        updateStats();
        currentPage = 1;
        renderTable();
      } catch (err) {
        console.error('Error:', err);
        document.querySelector('#subscribers-table tbody').innerHTML = '<tr><td colspan="4" class="empty-state"><div class="empty-state__icon">⚠️</div><div class="empty-state__text">Error cargando suscriptores</div></td></tr>';
      }
    }

    function exportCSV() {
      const filtered = getFiltered();
      if (!filtered.length) { CreaCRM.ui.showToast('No hay datos para exportar', 'err'); return; }
      const data = filtered.map(s => ({
        Email: s.email || '',
        WhatsApp: s.whatsapp || '',
        'Fecha suscripción': s.fecha_suscripcion || s.created_at || '',
        Activo: s.active !== false ? 'Sí' : 'No'
      }));
      CreaCRM.export.exportToCSV(data, 'subscribers_crea');
    }

    document.getElementById('search-input').addEventListener('input', () => { currentPage = 1; renderTable(); });
    document.getElementById('filter-active').addEventListener('change', () => { currentPage = 1; renderTable(); });

    document.addEventListener('DOMContentLoaded', loadSubscribers);
  </script>
</body>
</html>
