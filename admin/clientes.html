<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes / Anunciantes — Panel Editorial CREA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/dashboard.css">
  <style>
    .cms-section { background: var(--crea-white); border-radius: 0.75rem; border: 1px solid var(--crea-gris-border); padding: 1.5rem; margin-bottom: 1.5rem; }
    .cms-section__title { font-size: 1rem; font-weight: 700; color: var(--crea-noche); margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 2px solid var(--crea-gris-border); display: flex; align-items: center; gap: 0.5rem; }
    .cms-section__title span.icon { font-size: 1.1rem; }
    .filters { display: flex; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
    .filters select { padding: 0.5rem 0.75rem; border: 1px solid var(--crea-gris-border); border-radius: 0.5rem; font-family: 'Inter', sans-serif; font-size: 0.875rem; background: #fafafa; }
    .filters select:focus { outline: none; border-color: var(--crea-rojo); }
    .btn-add { background: var(--crea-verde); color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; font-weight: 600; font-size: 0.8125rem; transition: background .15s; }
    .btn-add:hover { background: #078059; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--crea-gris-text); border-bottom: 2px solid var(--crea-gris-border); }
    .data-table td { padding: 0.875rem 1rem; font-size: 0.875rem; border-bottom: 1px solid var(--crea-gris-border); vertical-align: middle; }
    .data-table tr:hover { background: #f9fafb; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
    .badge--basico { background: #e0e7ff; color: #4338ca; }
    .badge--premium { background: #fef3c7; color: #d97706; }
    .badge--gold { background: #fef3c7; color: #92400e; border: 1px solid #f59e0b; }
    .badge--active { background: #d1fae5; color: #065f46; }
    .badge--inactive { background: #fee2e2; color: #991b1b; }
    .action-btns { display: flex; gap: 0.5rem; }
    .btn-action { padding: 0.35rem 0.75rem; border-radius: 0.375rem; cursor: pointer; font-size: 0.75rem; font-weight: 500; border: 1px solid; transition: all .15s; }
    .btn-action--view { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
    .btn-action--view:hover { background: #dbeafe; }
    .btn-action--delete { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
    .btn-action--delete:hover { background: #fee2e2; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--crea-gris-text); font-size: 0.875rem; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 999; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 0.75rem; padding: 1.5rem; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .modal__title { font-size: 1rem; font-weight: 700; margin-bottom: 1.25rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 0.875rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.375rem; font-size: 0.8125rem; color: #374151; }
    .form-group input, .form-group select { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--crea-gris-border); border-radius: 0.5rem; font-family: 'Inter', sans-serif; font-size: 0.875rem; background: #fafafa; transition: border-color .15s; box-sizing: border-box; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--crea-rojo); background: white; }
    .modal__actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.25rem; }
    .btn-cancel { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; padding: 0.5rem 1.25rem; border-radius: 0.5rem; cursor: pointer; font-weight: 500; }
    .btn-save { background: #0A8F6C; color: white; border: none; padding: 0.5rem 1.25rem; border-radius: 0.5rem; cursor: pointer; font-weight: 600; }
    .btn-save:hover { background: #078059; }
    .btn-secondary-link { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; font-weight: 500; font-size: 0.8125rem; text-decoration: none; transition: background .15s; }
    .btn-secondary-link:hover { background: #e5e7eb; }
    #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.75rem 1.25rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; z-index: 9999; display: none; }
    #toast.ok { background: #0A8F6C; color: white; }
    #toast.err { background: #dc2626; color: white; }
    .client-name { font-weight: 600; }
    .client-business { color: var(--crea-gris-text); font-size: 0.8125rem; }
  </style>
</head>
<body>
  <aside class="dash-sidebar" id="dash-sidebar">
    <div class="dash-sidebar__header">
      <img src="/assets/img/public/logo-crea.png" alt="CREA Contenidos" class="dash-sidebar__logo">
      <span class="dash-sidebar__badge">Panel Editorial</span>
    </div>
    <nav class="dash-sidebar__nav">
      <div class="dash-nav__section-title">Principal</div>
      <a href="/admin/dashboard.html" class="dash-nav__link">
        <svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a href="/admin/articulos.html" class="dash-nav__link">
        <svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
        Artículos
      </a>
      <div class="dash-nav__section-title">Programas y Secciones</div>
      <a href="/admin/tercer-tiempo.html" class="dash-nav__link">
        <svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        Tercer Tiempo
      </a>
      <a href="/admin/newsletter.html" class="dash-nav__link">
        <svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        Newsletter
      </a>
      <div class="dash-nav__section-title">Comercial</div>
      <a href="/admin/comercial.html" class="dash-nav__link">
        <svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Paquetes / Comercial
      </a>
      <a href="/admin/clientes.html" class="dash-nav__link active">
        <svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        Clientes / Anunciantes
      </a>
    </nav>
  </aside>

  <header class="dash-topbar">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <span class="dash-topbar__title">Gestor: Clientes y Anunciantes</span>
    </div>
    <div style="display:flex;gap:0.75rem;align-items:center;">
      <button class="btn-add" onclick="openClientModal()">+ Agregar cliente</button>
    </div>
  </header>

  <main class="dash-main">
    <div class="cms-section">
      <div class="cms-section__title"><span class="icon">👥</span> Clientes registrados</div>
      <div class="filters">
        <select id="filter-package">
          <option value="">Todos los paquetes</option>
          <option value="basico">Básico</option>
          <option value="premium">Premium</option>
          <option value="gold">Gold</option>
        </select>
        <select id="filter-active">
          <option value="">Todos los estados</option>
          <option value="true">Activos</option>
          <option value="false">Inactivos</option>
        </select>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Paquete</th>
            <th>Contacto</th>
            <th>Inicio</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="clients-tbody">
          <tr><td colspan="6" class="empty-state">Cargando clientes...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="client-modal-overlay">
    <div class="modal">
      <div class="modal__title" id="client-modal-title">Nuevo cliente</div>
      <input type="hidden" id="client-id" value="">
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre de contacto *</label>
          <input type="text" id="client-name" placeholder="Juan Pérez">
        </div>
        <div class="form-group">
          <label>Nombre de empresa *</label>
          <input type="text" id="client-business" placeholder="Restaurante El Surtidor">
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Paquete *</label>
          <select id="client-package">
            <option value="basico">Básico</option>
            <option value="premium">Premium</option>
            <option value="gold">Gold</option>
          </select>
        </div>
        <div class="form-group">
          <label>Fecha de inicio</label>
          <input type="date" id="client-start">
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" id="client-phone" placeholder="2281234567">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="client-email" placeholder="contacto@empresa.com">
        </div>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:0.5rem;">
          <input type="checkbox" id="client-active" checked> Cliente activo
        </label>
      </div>
      <div class="modal__actions">
        <button class="btn-cancel" onclick="closeClientModal()">Cancelar</button>
        <button class="btn-save" onclick="saveClient()">Guardar cliente</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="/admin/js/session-guard.js"></script>
  <script>
    const API = '/api/clients/crud.php';
    let clients = [];

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = type;
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    function getPackageBadge(pkg) {
      const labels = { basico: 'Básico', premium: 'Premium', gold: 'Gold' };
      return `<span class="badge badge--${pkg}">${labels[pkg] || pkg}</span>`;
    }

    function renderClients() {
      const tbody = document.getElementById('clients-tbody');
      const pkgFilter = document.getElementById('filter-package').value;
      const activeFilter = document.getElementById('filter-active').value;

      let filtered = clients;
      if (pkgFilter) {
        filtered = filtered.filter(c => c.package === pkgFilter);
      }
      if (activeFilter) {
        const isActive = activeFilter === 'true';
        filtered = filtered.filter(c => c.active === isActive);
      }

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No hay clientes registrados.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(c => `
        <tr>
          <td>
            <div class="client-name">${escapeHtml(c.name)}</div>
            <div class="client-business">${escapeHtml(c.business_name)}</div>
          </td>
          <td>${getPackageBadge(c.package)}</td>
          <td>${escapeHtml(c.email || c.phone || '—')}</td>
          <td>${c.start_date || '—'}</td>
          <td><span class="badge ${c.active ? 'badge--active' : 'badge--inactive'}">${c.active ? 'Activo' : 'Inactivo'}</span></td>
          <td>
            <div class="action-btns">
              <button class="btn-action btn-action--view" onclick="openClientModal('${c.id}')">Editar</button>
              <button class="btn-action btn-action--delete" onclick="deleteClient('${c.id}')">Eliminar</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function openClientModal(id) {
      const modal = document.getElementById('client-modal-overlay');
      document.getElementById('client-id').value = id || '';
      document.getElementById('client-modal-title').textContent = id ? 'Editar cliente' : 'Nuevo cliente';

      if (id) {
        const client = clients.find(c => c.id === id);
        if (client) {
          document.getElementById('client-name').value = client.name || '';
          document.getElementById('client-business').value = client.business_name || '';
          document.getElementById('client-package').value = client.package || 'basico';
          document.getElementById('client-start').value = client.start_date || '';
          document.getElementById('client-phone').value = client.phone || '';
          document.getElementById('client-email').value = client.email || '';
          document.getElementById('client-active').checked = !!client.active;
        }
      } else {
        ['client-name','client-business','client-start','client-phone','client-email'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('client-package').value = 'basico';
        document.getElementById('client-active').checked = true;
      }
      modal.classList.add('open');
    }

    function closeClientModal() {
      document.getElementById('client-modal-overlay').classList.remove('open');
    }

    async function saveClient() {
      const id = document.getElementById('client-id').value;
      const client = {
        name: document.getElementById('client-name').value.trim(),
        business_name: document.getElementById('client-business').value.trim(),
        package: document.getElementById('client-package').value,
        start_date: document.getElementById('client-start').value,
        phone: document.getElementById('client-phone').value.trim(),
        email: document.getElementById('client-email').value.trim(),
        active: document.getElementById('client-active').checked
      };

      if (!client.name || !client.business_name) {
        showToast('Nombre y empresa son obligatorios.', 'err');
        return;
      }

      const method = id ? 'PATCH' : 'POST';
      if (id) client.id = id;

      try {
        const res = await fetch(API, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(client)
        });
        const data = await res.json();
        if (res.ok) {
          showToast(id ? 'Cliente actualizado' : 'Cliente creado', 'ok');
          closeClientModal();
          loadClients();
        } else {
          showToast(data.error || 'Error al guardar', 'err');
        }
      } catch (e) {
        showToast('Error de red', 'err');
      }
    }

    async function deleteClient(id) {
      if (!confirm('¿Eliminar este cliente?')) return;
      try {
        const res = await fetch(API + '?id=' + id, { method: 'DELETE' });
        if (res.ok) {
          showToast('Cliente eliminado', 'ok');
          loadClients();
        } else {
          const data = await res.json();
          showToast(data.error || 'Error al eliminar', 'err');
        }
      } catch (e) {
        showToast('Error de red', 'err');
      }
    }

    async function loadClients() {
      try {
        const res = await fetch(API);
        if (!res.ok) return;
        const data = await res.json();
        clients = data.clients || [];
        renderClients();
      } catch (e) {
        console.warn('Error cargando clientes');
      }
    }

    document.getElementById('filter-package').addEventListener('change', renderClients);
    document.getElementById('filter-active').addEventListener('change', renderClients);

    document.getElementById('client-modal-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('client-modal-overlay')) closeClientModal();
    });

    document.addEventListener('DOMContentLoaded', loadClients);
  </script>
</body>
</html>
