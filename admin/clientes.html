<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes / Anunciantes — Panel Editorial CREA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/dashboard.css">
</head>
<body>
  <div class="dash-overlay" id="dash-overlay"></div>

  <aside class="dash-sidebar" id="dash-sidebar">
  </aside>

  <header class="dash-topbar">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <button class="dash-topbar__menu-btn" id="btn-menu" aria-label="Menú">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="dash-topbar__title">Gestor: Clientes y Anunciantes</span>
    </div>
    <div style="display:flex;gap:0.75rem;align-items:center;">
      <button class="btn btn--success btn--sm" onclick="openClientModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M12 4v16m8-8H4"/></svg>
        Nuevo cliente
      </button>
    </div>
  </header>

  <main class="dash-main">
    <div class="crm-card">
      <div class="crm-card__header">
        <span class="crm-card__title">Clientes registrados</span>
        <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
          <select class="filter-select" id="report-month" style="width:auto;min-width:7rem;"></select>
          <input class="filter-select" id="report-year" type="number" min="2000" max="2100" style="width:5.75rem;">
          <button class="btn btn--secondary btn--sm" onclick="exportClientsCSV()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Exportar CSV
          </button>
        </div>
      </div>

      <div style="padding:1rem 1.25rem;">
        <div class="search-bar">
          <div class="search-input-wrapper">
            <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
            <input type="text" class="search-input" id="search-input" placeholder="Buscar por nombre, empresa, email...">
          </div>
          <div class="filter-group">
            <label>Paquete</label>
            <select class="filter-select" id="filter-package">
              <option value="">Todos</option>
              <option value="basico">Básico</option>
              <option value="premium">Premium</option>
              <option value="gold">Gold</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Estado</label>
            <select class="filter-select" id="filter-active">
              <option value="">Todos</option>
              <option value="true">Activos</option>
              <option value="false">Inactivos</option>
            </select>
          </div>
        </div>
      </div>

      <table class="data-table">
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Paquete</th>
            <th>Contacto</th>
            <th>Inicio</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="clients-tbody">
          <tr><td colspan="6" class="empty-state"><div class="spinner"></div><div style="margin-top:1rem;">Cargando clientes...</div></td></tr>
        </tbody>
      </table>
      <div id="pagination-container"></div>
    </div>
  </main>

  <div class="modal-overlay" id="client-modal-overlay">
    <div class="modal">
      <div class="modal__title" id="client-modal-title">Nuevo cliente</div>
      <input type="hidden" id="client-id" value="">
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre de contacto *</label>
          <input type="text" id="client-name" placeholder="Juan Pérez" maxlength="100">
        </div>
        <div class="form-group">
          <label>Nombre de empresa *</label>
          <input type="text" id="client-business" placeholder="Restaurante El Surtidor" maxlength="100">
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Paquete *</label>
          <select id="client-package">
            <option value="basico">Básico</option>
            <option value="premium">Premium</option>
            <option value="gold">Gold</option>
          </select>
        </div>
        <div class="form-group">
          <label>Fecha de inicio</label>
          <input type="date" id="client-start">
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" id="client-phone" placeholder="2281234567" maxlength="15">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="client-email" placeholder="contacto@empresa.com" maxlength="150">
        </div>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;">
          <input type="checkbox" id="client-active" checked> Cliente activo
        </label>
      </div>
      <div class="modal__actions">
        <button class="btn btn--secondary" onclick="closeClientModal()">Cancelar</button>
        <button class="btn btn--success" onclick="saveClient()" id="btn-save-client">Guardar cliente</button>
      </div>
    </div>
  </div>
  <script src="/admin/js/sidebar.js"></script>


  <script src="/admin/js/session-guard.js"></script>
  <script>
    const API = '/api/clients/crud.php';
    const REPORT_API = '/api/reports/generate.php';
    let clients = [];
    let currentPage = 1;
    const pageSize = 15;

    function getPackageBadge(pkg) {
      const labels = { basico: 'Básico', premium: 'Premium', gold: 'Gold' };
      return `<span class="dash-badge" style="background:${pkg === 'gold' ? '#fef3c7;color:#92400e;border:1px solid #f59e0b' : pkg === 'premium' ? '#fef3c7;color:#d97706' : '#e0e7ff;color:#4338ca'}">${labels[pkg] || pkg}</span>`;
    }

    function getFilteredClients() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const pkgFilter = document.getElementById('filter-package').value;
      const activeFilter = document.getElementById('filter-active').value;

      return clients.filter(c => {
        if (search && !(c.name || '').toLowerCase().includes(search) && !(c.business_name || '').toLowerCase().includes(search) && !(c.email || '').toLowerCase().includes(search)) return false;
        if (pkgFilter && c.package !== pkgFilter) return false;
        if (activeFilter && String(c.active) !== activeFilter) return false;
        return true;
      });
    }

    function renderClients() {
      const tbody = document.getElementById('clients-tbody');
      const filtered = getFilteredClients();

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><div class="empty-state__icon">👥</div><div class="empty-state__text">No hay clientes</div></td></tr>';
        CreaCRM.pagination.createPagination(document.getElementById('pagination-container'), 0, 1, pageSize, () => {});
        return;
      }

      const totalPages = Math.ceil(filtered.length / pageSize);
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * pageSize;
      const pageItems = filtered.slice(start, start + pageSize);

      tbody.innerHTML = pageItems.map(c => `
        <tr>
          <td>
            <div style="font-weight:600;">${CreaCRM.ui.escapeHtml(c.name)}</div>
            <div style="color:var(--crea-gris-text);font-size:0.8125rem;">${CreaCRM.ui.escapeHtml(c.business_name)}</div>
          </td>
          <td>${getPackageBadge(c.package)}</td>
          <td>${CreaCRM.ui.escapeHtml(c.email || c.phone || '—')}</td>
          <td>${c.start_date || '—'}</td>
          <td><span class="dash-badge" style="background:${c.active ? '#d1fae5;color:#065f46' : '#fee2e2;color:#991b1b'}">${c.active ? 'Activo' : 'Inactivo'}</span></td>
          <td>
            <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
              <button class="btn btn--secondary btn--sm" onclick="openClientModal('${c.id}')">Editar</button>
              <button class="btn btn--secondary btn--sm" id="btn-report-${c.id}" onclick="generateMonthlyReport('${c.id}')">Reporte mensual</button>
              <button class="btn btn--danger btn--sm" onclick="deleteClient('${c.id}')">Eliminar</button>
              <span id="report-link-${c.id}" style="font-size:0.8125rem;"></span>
            </div>
          </td>
        </tr>
      `).join('');

      CreaCRM.pagination.createPagination(document.getElementById('pagination-container'), filtered.length, currentPage, pageSize, (page) => {
        currentPage = page;
        renderClients();
      });
    }

    function setupReportControls() {
      const monthSelect = document.getElementById('report-month');
      const yearInput = document.getElementById('report-year');
      const today = new Date();
      const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
      monthSelect.innerHTML = monthNames.map((name, index) => `<option value="${index + 1}">${name}</option>`).join('');
      monthSelect.value = String(today.getMonth() + 1);
      yearInput.value = String(today.getFullYear());
    }

    function getReportPeriod() {
      const month = Number(document.getElementById('report-month').value);
      const year = Number(document.getElementById('report-year').value);
      if (!Number.isInteger(month) || month < 1 || month > 12 || !Number.isInteger(year) || year < 2000 || year > 2100) {
        CreaCRM.ui.showToast('Selecciona mes y año válidos', 'err');
        return null;
      }
      return { month, year };
    }

    async function generateMonthlyReport(clientId) {
      const period = getReportPeriod();
      if (!period) return;

      const btn = document.getElementById('btn-report-' + clientId);
      const link = document.getElementById('report-link-' + clientId);
      btn.disabled = true;
      btn.textContent = 'Generando...';
      link.textContent = '';

      try {
        const res = await CreaCRM.api.apiFetch(REPORT_API, {
          method: 'POST',
          body: JSON.stringify({ client_id: clientId, month: period.month, year: period.year })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          CreaCRM.ui.showToast(data.error || 'Error al generar reporte', 'err');
          return;
        }
        link.innerHTML = `<a href="${CreaCRM.ui.escapeHtml(data.url)}" target="_blank" rel="noopener">Descargar</a>`;
        CreaCRM.ui.showToast('Reporte generado', 'ok');
      } catch (e) {
        CreaCRM.ui.showToast('Error de red', 'err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Reporte mensual';
      }
    }

    function openClientModal(id) {
      const modal = document.getElementById('client-modal-overlay');
      document.getElementById('client-id').value = id || '';
      document.getElementById('client-modal-title').textContent = id ? 'Editar cliente' : 'Nuevo cliente';

      if (id) {
        const client = clients.find(c => c.id === id);
        if (client) {
          document.getElementById('client-name').value = client.name || '';
          document.getElementById('client-business').value = client.business_name || '';
          document.getElementById('client-package').value = client.package || 'basico';
          document.getElementById('client-start').value = client.start_date || '';
          document.getElementById('client-phone').value = client.phone || '';
          document.getElementById('client-email').value = client.email || '';
          document.getElementById('client-active').checked = !!client.active;
        }
      } else {
        ['client-name','client-business','client-start','client-phone','client-email'].forEach(i => document.getElementById(i).value = '');
        document.getElementById('client-package').value = 'basico';
        document.getElementById('client-active').checked = true;
      }
      modal.classList.add('open');
      setTimeout(() => document.getElementById('client-name').focus(), 100);
    }

    function closeClientModal() {
      document.getElementById('client-modal-overlay').classList.remove('open');
      document.querySelectorAll('.field-error').forEach(e => e.style.display = 'none');
      document.querySelectorAll('.field-error-input').forEach(e => e.classList.remove('field-error-input'));
    }

    async function saveClient() {
      const id = document.getElementById('client-id').value;
      const nameInput = document.getElementById('client-name');
      const businessInput = document.getElementById('client-business');
      const emailInput = document.getElementById('client-email');
      const phoneInput = document.getElementById('client-phone');

      ['client-name','client-business','client-email','client-phone'].forEach(i => CreaCRM.validation.clearFieldError(document.getElementById(i)));

      const nameResult = CreaCRM.validation.validateField(nameInput, { required: true, max: 100 });
      const businessResult = CreaCRM.validation.validateField(businessInput, { required: true, max: 100 });

      let valid = true;
      if (!nameResult.valid) { CreaCRM.validation.showFieldError(nameInput, nameResult.errors[0]); valid = false; }
      if (!businessResult.valid) { CreaCRM.validation.showFieldError(businessInput, businessResult.errors[0]); valid = false; }

      const emailVal = emailInput.value.trim();
      if (emailVal && !CreaCRM.validation.validateEmail(emailVal)) {
        CreaCRM.validation.showFieldError(emailInput, 'Email no válido');
        valid = false;
      }

      const phoneVal = phoneInput.value.trim();
      if (phoneVal && !CreaCRM.validation.validatePhone(phoneVal)) {
        CreaCRM.validation.showFieldError(phoneInput, 'Teléfono no válido (10-15 dígitos)');
        valid = false;
      }

      if (!valid) return;

      const client = {
        name: nameInput.value.trim(),
        business_name: businessInput.value.trim(),
        package: document.getElementById('client-package').value,
        start_date: document.getElementById('client-start').value,
        phone: phoneVal,
        email: emailVal,
        active: document.getElementById('client-active').checked
      };

      const btn = document.getElementById('btn-save-client');
      btn.disabled = true;
      btn.textContent = 'Guardando...';

      try {
        const res = await CreaCRM.api.apiFetch(API, {
          method: id ? 'PATCH' : 'POST',
          body: JSON.stringify(id ? { ...client, id } : client)
        });
        const data = await res.json();
        if (res.ok) {
          CreaCRM.ui.showToast(id ? 'Cliente actualizado' : 'Cliente creado', 'ok');
          closeClientModal();
          await loadClients();
        } else {
          CreaCRM.ui.showToast(data.error || 'Error al guardar', 'err');
        }
      } catch (e) {
        CreaCRM.ui.showToast('Error de red', 'err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar cliente';
      }
    }

    async function deleteClient(id) {
      if (!confirm('¿Eliminar este cliente? Esta acción no se puede deshacer.')) return;
      try {
        const res = await CreaCRM.api.apiFetch(API + '?id=' + id, { method: 'DELETE' });
        if (res.ok) {
          CreaCRM.ui.showToast('Cliente eliminado', 'ok');
          await loadClients();
        } else {
          const data = await res.json();
          CreaCRM.ui.showToast(data.error || 'Error al eliminar', 'err');
        }
      } catch (e) {
        CreaCRM.ui.showToast('Error de red', 'err');
      }
    }

    async function loadClients() {
      try {
        const res = await CreaCRM.api.apiFetch(API);
        const data = await res.json();
        clients = data.clients || [];
        currentPage = 1;
        renderClients();
      } catch (e) {
        console.warn('Error cargando clientes');
        document.getElementById('clients-tbody').innerHTML = '<tr><td colspan="6" class="empty-state"><div class="empty-state__icon">⚠️</div><div class="empty-state__text">Error cargando clientes</div></td></tr>';
      }
    }

    function exportClientsCSV() {
      const filtered = getFilteredClients();
      if (!filtered.length) {
        CreaCRM.ui.showToast('No hay datos para exportar', 'err');
        return;
      }
      const data = filtered.map(c => ({
        Nombre: c.name || '',
        Empresa: c.business_name || '',
        Paquete: c.package || '',
        Email: c.email || '',
        Telefono: c.phone || '',
        'Fecha inicio': c.start_date || '',
        Estado: c.active ? 'Activo' : 'Inactivo'
      }));
      CreaCRM.export.exportToCSV(data, 'clientes_crea');
    }

    document.getElementById('search-input').addEventListener('input', () => { currentPage = 1; renderClients(); });
    document.getElementById('filter-package').addEventListener('change', () => { currentPage = 1; renderClients(); });
    document.getElementById('filter-active').addEventListener('change', () => { currentPage = 1; renderClients(); });

    document.getElementById('client-modal-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('client-modal-overlay')) closeClientModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeClientModal();
    });

    CreaCRM.ui.initKeyboardShortcuts({
      'n': () => { if (!document.getElementById('client-modal-overlay').classList.contains('open')) openClientModal(); }
    });

    document.addEventListener('DOMContentLoaded', () => {
      setupReportControls();
      loadClients();
    });
  </script>
</body>
</html>
