<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario Editorial — CREA Contenidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/dashboard.css">
  <style>
    .cal-container { max-width: 1200px; }
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .cal-title { font-size: 1.25rem; font-weight: 700; color: var(--crea-text); }
    .cal-nav { display: flex; gap: 0.5rem; }
    .cal-nav-btn { background: var(--crea-white); border: 1px solid var(--crea-gris-border); padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; cursor: pointer; transition: all 0.2s; }
    .cal-nav-btn:hover { background: var(--crea-gris-bg); }
    .cal-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .scheduled-list { background: var(--crea-white); border-radius: 0.75rem; border: 1px solid var(--crea-gris-border); overflow: hidden; }
    .scheduled-list__header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; border-bottom: 1px solid var(--crea-gris-border); }
    .scheduled-list__title { font-size: 0.9375rem; font-weight: 600; }
    .scheduled-item { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; border-bottom: 1px solid var(--crea-gris-border); cursor: pointer; transition: background 0.15s; }
    .scheduled-item:last-child { border-bottom: none; }
    .scheduled-item:hover { background: #F9FAFB; }
    .scheduled-item__date { min-width: 100px; text-align: center; padding: 0.5rem; background: var(--crea-gris-bg); border-radius: 0.5rem; }
    .scheduled-item__day { font-size: 1.5rem; font-weight: 700; color: var(--crea-text); line-height: 1; }
    .scheduled-item__month { font-size: 0.6875rem; text-transform: uppercase; color: var(--crea-gris-text); font-weight: 600; }
    .scheduled-item__info { flex: 1; }
    .scheduled-item__title { font-size: 0.9375rem; font-weight: 500; color: var(--crea-text); margin-bottom: 0.25rem; }
    .scheduled-item__meta { display: flex; gap: 1rem; font-size: 0.75rem; color: var(--crea-gris-text); }
    .scheduled-item__actions { display: flex; gap: 0.5rem; }
    .badge-format { font-size: 0.625rem; padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-weight: 600; text-transform: uppercase; }
    .badge-format--articulo { background: #DBEAFE; color: #1E40AF; }
    .badge-format--video { background: #FEE2E2; color: #991B1B; }
    .badge-format--podcast { background: #D1FAE5; color: #065F46; }
    .badge-format--newsletter { background: #FEF3C7; color: #92400E; }
    .badge-format--social { background: #F3E8FF; color: #6B21A8; }
    .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.8125rem; font-weight: 500; border-radius: 0.375rem; cursor: pointer; transition: all 0.2s; border: none; background: var(--crea-gris-bg); color: var(--crea-text); border: 1px solid var(--crea-gris-border); }
    .btn-sm:hover { background: var(--crea-gris-border); }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--crea-gris-text); }
    .empty-state__icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state__text { font-size: 1rem; margin-bottom: 0.5rem; }
    .empty-state__sub { font-size: 0.875rem; color: #9CA3AF; }
    .group-date { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--crea-gris-text); padding: 1rem 1.25rem 0.5rem; background: var(--crea-gris-bg); border-bottom: 1px solid var(--crea-gris-border); }
    .no-date-section { background: #FEF3C7; }
    .no-date-section .scheduled-item__date { background: #FDE68A; }
    @media (max-width: 768px) {
      .scheduled-item { flex-direction: column; align-items: flex-start; }
      .scheduled-item__date { display: flex; align-items: baseline; gap: 0.5rem; min-width: auto; }
      .scheduled-item__actions { width: 100%; justify-content: flex-end; margin-top: 0.5rem; }
    }
  </style>
</head>
<body>

  <div class="dash-overlay" id="dash-overlay"></div>

  <aside class="dash-sidebar" id="dash-sidebar">
  </aside>

  <header class="dash-topbar">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <button class="dash-topbar__menu-btn" id="btn-menu" aria-label="Menú">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="dash-topbar__title">Calendario Editorial</span>
    </div>
    <div class="dash-topbar__user">
      <div class="dash-topbar__avatar" id="user-avatar">E</div>
      <span id="user-name">Editor</span>
    </div>
  </header>

  <main class="dash-main">
    <div class="cal-container">
      
      <div class="cal-header">
        <h1 class="cal-title">Publicaciones Programadas</h1>
        <a href="/admin/editorial.html" class="btn-sm" style="text-decoration:none;">+ Nueva propuesta</a>
      </div>

      <div class="cal-stats">
        <div class="dash-stat-card">
          <div class="dash-stat-card__label">Total programadas</div>
          <div class="dash-stat-card__value" id="stat-total">—</div>
        </div>
        <div class="dash-stat-card">
          <div class="dash-stat-card__label">Esta semana</div>
          <div class="dash-stat-card__value green" id="stat-week">—</div>
        </div>
        <div class="dash-stat-card">
          <div class="dash-stat-card__label">Este mes</div>
          <div class="dash-stat-card__value amber" id="stat-month">—</div>
        </div>
      </div>

      <div class="scheduled-list" id="scheduled-list">
        <div class="empty-state">
          <div class="empty-state__icon">📅</div>
          <div class="empty-state__text">Cargando...</div>
        </div>
      </div>

    </div>
  </main>  <script src="/admin/js/sidebar.js"></script>


  <script src="/admin/js/session-guard.js"></script>
  <script>
    const API = '/api/content-proposals/crud.php';


    function getFormatBadgeClass(format) {
      const map = {
        'articulo': 'badge-format--articulo',
        'video': 'badge-format--video',
        'podcast': 'badge-format--podcast',
        'newsletter': 'badge-format--newsletter',
        'social': 'badge-format--social'
      };
      return map[format] || 'badge-format--articulo';
    }

    async function loadScheduled() {
      try {
        const res = await CreaCRM.api.apiFetch(`${API}?status=scheduled`);
        const data = await res.json();
        let scheduled = data.proposals || [];

        const resApproved = await CreaCRM.api.apiFetch(`${API}?status=approved`);
        const dataApproved = await resApproved.json();
        const approved = (dataApproved.proposals || []).filter(p => p.scheduled_at);

        scheduled = [...scheduled, ...approved];
        scheduled.sort((a, b) => new Date(a.scheduled_at || 0) - new Date(b.scheduled_at || 0));

        updateStats(scheduled);
        renderScheduled(scheduled);
      } catch (err) {
        console.error('Error loading scheduled:', err);
        document.getElementById('scheduled-list').innerHTML = `
          <div class="empty-state">
            <div class="empty-state__icon">⚠️</div>
            <div class="empty-state__text">Error cargando programadas</div>
          </div>
        `;
      }
    }

    function updateStats(scheduled) {
      const now = new Date();
      const weekEnd = new Date(now);
      weekEnd.setDate(weekEnd.getDate() + 7);
      const monthEnd = new Date(now);
      monthEnd.setMonth(monthEnd.getMonth() + 1);

      const thisWeek = scheduled.filter(p => {
        const d = new Date(p.scheduled_at);
        return d >= now && d <= weekEnd;
      });

      const thisMonth = scheduled.filter(p => {
        const d = new Date(p.scheduled_at);
        return d >= now && d <= monthEnd;
      });

      document.getElementById('stat-total').textContent = scheduled.length;
      document.getElementById('stat-week').textContent = thisWeek.length;
      document.getElementById('stat-month').textContent = thisMonth.length;
    }

    function renderScheduled(scheduled) {
      const list = document.getElementById('scheduled-list');

      if (scheduled.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state__icon">📅</div>
            <div class="empty-state__text">No hay publicaciones programadas</div>
            <div class="empty-state__sub">Las propuestas aprobadas y programadas aparecerán aquí</div>
          </div>
        `;
        return;
      }

      const grouped = {};
      let noDateCount = 0;

      scheduled.forEach(p => {
        const dateKey = p.scheduled_at ? p.scheduled_at.split('T')[0] : '__no_date__';
        if (!dateKey || dateKey === '__no_date__') {
          noDateCount++;
          return;
        }
        if (!grouped[dateKey]) grouped[dateKey] = [];
        grouped[dateKey].push(p);
      });

      let html = '';

      Object.keys(grouped).sort().forEach(dateKey => {
        const date = new Date(dateKey + 'T00:00:00');
        const day = date.getDate();
        const month = date.toLocaleDateString('es-MX', { month: 'short' }).toUpperCase();

        html += `<div class="group-date">${CreaCRM.ui.formatDate(dateKey)}</div>`;
        html += grouped[dateKey].map(p => `
          <div class="scheduled-item" onclick="editProposal('${p.id}')">
            <div class="scheduled-item__date">
              <div class="scheduled-item__day">${day}</div>
              <div class="scheduled-item__month">${month}</div>
            </div>
            <div class="scheduled-item__info">
              <div class="scheduled-item__title">${CreaCRM.ui.escapeHtml(p.title || 'Sin título')}</div>
              <div class="scheduled-item__meta">
                <span class="badge-format ${getFormatBadgeClass(p.format)}">${p.format || 'articulo'}</span>
                <span>${p.topic_title ? CreaCRM.ui.escapeHtml(p.topic_title) : 'Sin topic'}</span>
              </div>
            </div>
            <div class="scheduled-item__actions">
              <button class="btn-sm" onclick="event.stopPropagation(); editProposal('${p.id}')">Editar</button>
            </div>
          </div>
        `).join('');
      });

      if (noDateCount > 0) {
        html += `
          <div class="group-date no-date-section">Sin fecha específica</div>
          ${scheduled.filter(p => !p.scheduled_at).map(p => `
            <div class="scheduled-item" onclick="editProposal('${p.id}')">
              <div class="scheduled-item__date">
                <div class="scheduled-item__day">—</div>
                <div class="scheduled-item__month">SIN FECHA</div>
              </div>
              <div class="scheduled-item__info">
                <div class="scheduled-item__title">${CreaCRM.ui.escapeHtml(p.title || 'Sin título')}</div>
                <div class="scheduled-item__meta">
                  <span class="badge-format ${getFormatBadgeClass(p.format)}">${p.format || 'articulo'}</span>
                </div>
              </div>
              <div class="scheduled-item__actions">
                <button class="btn-sm" onclick="event.stopPropagation(); editProposal('${p.id}')">Editar</button>
              </div>
            </div>
          `).join('')}
        `;
      }

      list.innerHTML = html;
    }

    function editProposal(id) {
      window.location.href = `/admin/editorial-editor.html?id=${id}&mode=edit`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadScheduled();
    });
  </script>
</body>
</html>
