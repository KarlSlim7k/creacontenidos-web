<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario Editorial — CREA Contenidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/dashboard.css">
  <style>
    .cal-container { max-width: 1200px; }
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .cal-title { font-size: 1.25rem; font-weight: 700; color: var(--crea-text); }
    .cal-nav { display: flex; gap: 0.5rem; }
    .cal-nav-btn { background: var(--crea-white); border: 1px solid var(--crea-gris-border); padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; cursor: pointer; transition: all 0.2s; }
    .cal-nav-btn:hover { background: var(--crea-gris-bg); }
    .cal-drop-grid { background: var(--crea-white); border: 1px solid var(--crea-gris-border); border-radius: 0.75rem; overflow: hidden; margin-bottom: 1.5rem; }
    .cal-drop-grid__header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; border-bottom: 1px solid var(--crea-gris-border); gap: 1rem; }
    .cal-drop-grid__title { font-size: 0.9375rem; font-weight: 600; }
    .cal-drop-grid__hint { font-size: 0.75rem; color: var(--crea-gris-text); }
    .cal-weekdays, .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cal-weekday { padding: 0.625rem; background: #F9FAFB; border-bottom: 1px solid var(--crea-gris-border); text-align: center; font-size: 0.6875rem; font-weight: 700; color: var(--crea-gris-text); text-transform: uppercase; letter-spacing: 0.05em; }
    .cal-day-cell { min-height: 112px; padding: 0.625rem; border-right: 1px solid var(--crea-gris-border); border-bottom: 1px solid var(--crea-gris-border); background: #fff; transition: background 0.15s, box-shadow 0.15s; }
    .cal-day-cell:nth-child(7n) { border-right: none; }
    .cal-day-cell.is-muted { background: #F9FAFB; color: #9CA3AF; }
    .cal-day-cell.is-today { box-shadow: inset 0 0 0 2px rgba(204, 41, 54, 0.25); }
    .cal-day-cell.is-over { background: #ECFDF5; box-shadow: inset 0 0 0 2px var(--crea-verde); }
    .cal-day-number { font-size: 0.8125rem; font-weight: 700; margin-bottom: 0.5rem; }
    .cal-day-items { display: flex; flex-direction: column; gap: 0.375rem; }
    .cal-pill { border: none; text-align: left; width: 100%; padding: 0.375rem 0.5rem; border-radius: 0.375rem; background: #EEF2FF; color: #3730A3; font-size: 0.6875rem; font-weight: 600; line-height: 1.25; cursor: grab; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cal-pill:active, .scheduled-item:active { cursor: grabbing; }
    .scheduled-item.is-dragging, .cal-pill.is-dragging { opacity: 0.45; }
    .cal-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .scheduled-list { background: var(--crea-white); border-radius: 0.75rem; border: 1px solid var(--crea-gris-border); overflow: hidden; }
    .scheduled-list__header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; border-bottom: 1px solid var(--crea-gris-border); }
    .scheduled-list__title { font-size: 0.9375rem; font-weight: 600; }
    .scheduled-item { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; border-bottom: 1px solid var(--crea-gris-border); cursor: pointer; transition: background 0.15s; }
    .scheduled-item:last-child { border-bottom: none; }
    .scheduled-item:hover { background: #F9FAFB; }
    .scheduled-item__date { min-width: 100px; text-align: center; padding: 0.5rem; background: var(--crea-gris-bg); border-radius: 0.5rem; }
    .scheduled-item__day { font-size: 1.5rem; font-weight: 700; color: var(--crea-text); line-height: 1; }
    .scheduled-item__month { font-size: 0.6875rem; text-transform: uppercase; color: var(--crea-gris-text); font-weight: 600; }
    .scheduled-item__info { flex: 1; }
    .scheduled-item__title { font-size: 0.9375rem; font-weight: 500; color: var(--crea-text); margin-bottom: 0.25rem; }
    .scheduled-item__meta { display: flex; gap: 1rem; font-size: 0.75rem; color: var(--crea-gris-text); }
    .scheduled-item__actions { display: flex; gap: 0.5rem; }
    .badge-format { font-size: 0.625rem; padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-weight: 600; text-transform: uppercase; }
    .badge-format--articulo { background: #DBEAFE; color: #1E40AF; }
    .badge-format--video { background: #FEE2E2; color: #991B1B; }
    .badge-format--podcast { background: #D1FAE5; color: #065F46; }
    .badge-format--newsletter { background: #FEF3C7; color: #92400E; }
    .badge-format--social { background: #F3E8FF; color: #6B21A8; }
    .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.8125rem; font-weight: 500; border-radius: 0.375rem; cursor: pointer; transition: all 0.2s; border: none; background: var(--crea-gris-bg); color: var(--crea-text); border: 1px solid var(--crea-gris-border); }
    .btn-sm:hover { background: var(--crea-gris-border); }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--crea-gris-text); }
    .empty-state__icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state__text { font-size: 1rem; margin-bottom: 0.5rem; }
    .empty-state__sub { font-size: 0.875rem; color: #9CA3AF; }
    .group-date { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--crea-gris-text); padding: 1rem 1.25rem 0.5rem; background: var(--crea-gris-bg); border-bottom: 1px solid var(--crea-gris-border); }
    .group-date.is-over { background: #ECFDF5; color: #065F46; }
    .no-date-section { background: #FEF3C7; }
    .no-date-section .scheduled-item__date { background: #FDE68A; }
    @media (max-width: 768px) {
      .cal-weekday { font-size: 0.6rem; padding: 0.5rem 0.25rem; }
      .cal-day-cell { min-height: 84px; padding: 0.375rem; }
      .cal-pill { font-size: 0.625rem; }
      .scheduled-item { flex-direction: column; align-items: flex-start; }
      .scheduled-item__date { display: flex; align-items: baseline; gap: 0.5rem; min-width: auto; }
      .scheduled-item__actions { width: 100%; justify-content: flex-end; margin-top: 0.5rem; }
    }
  </style>
</head>
<body>

  <div class="dash-overlay" id="dash-overlay"></div>

  <aside class="dash-sidebar" id="dash-sidebar">
  </aside>

  <header class="dash-topbar">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <button class="dash-topbar__menu-btn" id="btn-menu" aria-label="Menú">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="dash-topbar__title">Calendario Editorial</span>
    </div>
    <div class="dash-topbar__user">
      <div class="dash-topbar__avatar" id="user-avatar">E</div>
      <span id="user-name">Editor</span>
    </div>
  </header>

  <main class="dash-main">
    <div class="cal-container">
      
      <div class="cal-header">
        <h1 class="cal-title">Publicaciones Programadas</h1>
        <a href="/admin/editorial.html" class="btn-sm" style="text-decoration:none;">+ Nueva propuesta</a>
      </div>

      <div class="cal-stats">
        <div class="dash-stat-card">
          <div class="dash-stat-card__label">Total programadas</div>
          <div class="dash-stat-card__value" id="stat-total">—</div>
        </div>
        <div class="dash-stat-card">
          <div class="dash-stat-card__label">Esta semana</div>
          <div class="dash-stat-card__value green" id="stat-week">—</div>
        </div>
        <div class="dash-stat-card">
          <div class="dash-stat-card__label">Este mes</div>
          <div class="dash-stat-card__value amber" id="stat-month">—</div>
        </div>
      </div>

      <div class="cal-drop-grid" id="calendar-drop-grid">
        <div class="cal-drop-grid__header">
          <div>
            <h2 class="cal-drop-grid__title" id="calendar-month-title">Calendario</h2>
            <div class="cal-drop-grid__hint">Arrastra una publicación a otro día para reprogramarla.</div>
          </div>
          <div class="cal-nav">
            <button class="cal-nav-btn" id="btn-prev-month" type="button">← Mes</button>
            <button class="cal-nav-btn" id="btn-today" type="button">Hoy</button>
            <button class="cal-nav-btn" id="btn-next-month" type="button">Mes →</button>
          </div>
        </div>
        <div class="cal-weekdays">
          <div class="cal-weekday">Lun</div>
          <div class="cal-weekday">Mar</div>
          <div class="cal-weekday">Mié</div>
          <div class="cal-weekday">Jue</div>
          <div class="cal-weekday">Vie</div>
          <div class="cal-weekday">Sáb</div>
          <div class="cal-weekday">Dom</div>
        </div>
        <div class="cal-days" id="calendar-days"></div>
      </div>

      <div class="scheduled-list" id="scheduled-list">
        <div class="empty-state">
          <div class="empty-state__icon">📅</div>
          <div class="empty-state__text">Cargando...</div>
        </div>
      </div>

    </div>
  </main>  <script src="/admin/js/sidebar.js"></script>


  <script src="/admin/js/session-guard.js"></script>
  <script>
    const API = '/api/content-proposals/crud.php';
    const SCHEDULE_API = '/api/content-proposals/schedule.php';
    let scheduledItems = [];
    let calendarMonth = new Date();
    let dragClickLock = false;


    function getFormatBadgeClass(format) {
      const map = {
        'articulo': 'badge-format--articulo',
        'video': 'badge-format--video',
        'podcast': 'badge-format--podcast',
        'newsletter': 'badge-format--newsletter',
        'social': 'badge-format--social'
      };
      return map[format] || 'badge-format--articulo';
    }

    async function loadScheduled() {
      try {
        const [scheduledRes, approvedRes] = await Promise.all([
          CreaCRM.api.apiFetch(`${API}?status=scheduled`),
          CreaCRM.api.apiFetch(`${API}?status=approved`)
        ]);
        const scheduledData = await scheduledRes.json();
        const approvedData = await approvedRes.json();
        const proposalsById = new Map();

        [...(scheduledData.proposals || []), ...(approvedData.proposals || [])].forEach(proposal => {
          proposalsById.set(proposal.id, proposal);
        });

        scheduledItems = Array.from(proposalsById.values()).sort((firstProposal, secondProposal) => {
          const firstDate = firstProposal.scheduled_at ? new Date(firstProposal.scheduled_at).getTime() : Number.MAX_SAFE_INTEGER;
          const secondDate = secondProposal.scheduled_at ? new Date(secondProposal.scheduled_at).getTime() : Number.MAX_SAFE_INTEGER;
          return firstDate - secondDate;
        });

        updateStats(scheduledItems);
        renderCalendarGrid(scheduledItems);
        renderScheduled(scheduledItems);
      } catch (err) {
        console.error('Error loading scheduled:', err);
        document.getElementById('scheduled-list').innerHTML = `
          <div class="empty-state">
            <div class="empty-state__icon">⚠️</div>
            <div class="empty-state__text">Error cargando programadas</div>
          </div>
        `;
      }
    }

    function updateStats(scheduled) {
      const now = new Date();
      const weekEnd = new Date(now);
      weekEnd.setDate(weekEnd.getDate() + 7);
      const monthEnd = new Date(now);
      monthEnd.setMonth(monthEnd.getMonth() + 1);

      const scheduledWithDate = scheduled.filter(proposal => proposal.scheduled_at);

      const thisWeek = scheduledWithDate.filter(proposal => {
        const scheduledDate = new Date(proposal.scheduled_at);
        return scheduledDate >= now && scheduledDate <= weekEnd;
      });

      const thisMonth = scheduledWithDate.filter(proposal => {
        const scheduledDate = new Date(proposal.scheduled_at);
        return scheduledDate >= now && scheduledDate <= monthEnd;
      });

      document.getElementById('stat-total').textContent = scheduledWithDate.length;
      document.getElementById('stat-week').textContent = thisWeek.length;
      document.getElementById('stat-month').textContent = thisMonth.length;
    }

    function dateKeyFromDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function dateKeyFromScheduledAt(scheduledAt) {
      if (!scheduledAt) return null;
      return String(scheduledAt).split('T')[0];
    }

    function renderCalendarGrid(scheduled) {
      const daysContainer = document.getElementById('calendar-days');
      const title = document.getElementById('calendar-month-title');
      if (!daysContainer || !title) return;

      title.textContent = calendarMonth.toLocaleDateString('es-MX', { month: 'long', year: 'numeric' });

      const firstDay = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth(), 1);
      const startDate = new Date(firstDay);
      const mondayOffset = (firstDay.getDay() + 6) % 7;
      startDate.setDate(firstDay.getDate() - mondayOffset);

      const byDate = scheduled.reduce((accumulator, proposal) => {
        const dateKey = dateKeyFromScheduledAt(proposal.scheduled_at);
        if (!dateKey) return accumulator;
        if (!accumulator[dateKey]) accumulator[dateKey] = [];
        accumulator[dateKey].push(proposal);
        return accumulator;
      }, {});

      const todayKey = dateKeyFromDate(new Date());
      let html = '';

      for (let dayIndex = 0; dayIndex < 42; dayIndex++) {
        const date = new Date(startDate);
        date.setDate(startDate.getDate() + dayIndex);
        const dateKey = dateKeyFromDate(date);
        const isCurrentMonth = date.getMonth() === calendarMonth.getMonth();
        const items = byDate[dateKey] || [];

        html += `
          <div class="cal-day-cell${isCurrentMonth ? '' : ' is-muted'}${dateKey === todayKey ? ' is-today' : ''}" data-date="${dateKey}">
            <div class="cal-day-number">${date.getDate()}</div>
            <div class="cal-day-items">
              ${items.slice(0, 3).map(proposal => `
                <button class="cal-pill" type="button" draggable="true" data-proposal-id="${proposal.id}" data-scheduled-at="${proposal.scheduled_at || ''}" title="${CreaCRM.ui.escapeHtml(proposal.title || 'Sin título')}" onclick="handleProposalClick(event, '${proposal.id}')">
                  ${CreaCRM.ui.escapeHtml(proposal.title || 'Sin título')}
                </button>
              `).join('')}
              ${items.length > 3 ? `<button class="cal-pill" type="button" data-date-more="${dateKey}">+${items.length - 3} más</button>` : ''}
            </div>
          </div>
        `;
      }

      daysContainer.innerHTML = html;
      initDragAndDrop();
    }

    function renderScheduled(scheduled) {
      const list = document.getElementById('scheduled-list');

      if (scheduled.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state__icon">📅</div>
            <div class="empty-state__text">No hay publicaciones programadas</div>
            <div class="empty-state__sub">Las propuestas aprobadas y programadas aparecerán aquí</div>
          </div>
        `;
        return;
      }

      const grouped = {};
      let noDateCount = 0;

      scheduled.forEach(proposal => {
        const dateKey = dateKeyFromScheduledAt(proposal.scheduled_at) || '__no_date__';
        if (!dateKey || dateKey === '__no_date__') {
          noDateCount++;
          return;
        }
        if (!grouped[dateKey]) grouped[dateKey] = [];
        grouped[dateKey].push(proposal);
      });

      let html = '';

      Object.keys(grouped).sort().forEach(dateKey => {
        const date = new Date(dateKey + 'T00:00:00');
        const day = date.getDate();
        const month = date.toLocaleDateString('es-MX', { month: 'short' }).toUpperCase();

        html += `<div class="group-date" data-date="${dateKey}">${CreaCRM.ui.formatDate(dateKey)}</div>`;
        html += grouped[dateKey].map(proposal => `
          <div class="scheduled-item" draggable="true" data-proposal-id="${proposal.id}" data-scheduled-at="${proposal.scheduled_at || ''}" onclick="handleProposalClick(event, '${proposal.id}')">
            <div class="scheduled-item__date">
              <div class="scheduled-item__day">${day}</div>
              <div class="scheduled-item__month">${month}</div>
            </div>
            <div class="scheduled-item__info">
              <div class="scheduled-item__title">${CreaCRM.ui.escapeHtml(proposal.title || 'Sin título')}</div>
              <div class="scheduled-item__meta">
                <span class="badge-format ${getFormatBadgeClass(proposal.format)}">${proposal.format || 'articulo'}</span>
                <span>${proposal.topic_title ? CreaCRM.ui.escapeHtml(proposal.topic_title) : 'Sin topic'}</span>
              </div>
            </div>
            <div class="scheduled-item__actions">
              <button class="btn-sm" onclick="event.stopPropagation(); editProposal('${proposal.id}')">Editar</button>
            </div>
          </div>
        `).join('');
      });

      if (noDateCount > 0) {
        html += `
          <div class="group-date no-date-section">Sin fecha específica</div>
          ${scheduled.filter(proposal => !proposal.scheduled_at).map(proposal => `
            <div class="scheduled-item" draggable="true" data-proposal-id="${proposal.id}" data-scheduled-at="" onclick="handleProposalClick(event, '${proposal.id}')">
              <div class="scheduled-item__date">
                <div class="scheduled-item__day">—</div>
                <div class="scheduled-item__month">SIN FECHA</div>
              </div>
              <div class="scheduled-item__info">
                <div class="scheduled-item__title">${CreaCRM.ui.escapeHtml(proposal.title || 'Sin título')}</div>
                <div class="scheduled-item__meta">
                  <span class="badge-format ${getFormatBadgeClass(proposal.format)}">${proposal.format || 'articulo'}</span>
                </div>
              </div>
              <div class="scheduled-item__actions">
                <button class="btn-sm" onclick="event.stopPropagation(); editProposal('${proposal.id}')">Editar</button>
              </div>
            </div>
          `).join('')}
        `;
      }

      list.innerHTML = html;
      initDragAndDrop();
    }

    function initDragAndDrop() {
      document.querySelectorAll('[draggable="true"][data-proposal-id]').forEach(draggable => {
        draggable.ondragstart = handleDragStart;
        draggable.ondragend = handleDragEnd;
      });

      document.querySelectorAll('.cal-day-cell[data-date], .group-date[data-date]').forEach(dropZone => {
        dropZone.ondragover = handleDragOver;
        dropZone.ondragleave = handleDragLeave;
        dropZone.ondrop = handleDrop;
      });
    }

    function handleDragStart(event) {
      const proposalId = event.currentTarget.dataset.proposalId;
      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('text/plain', proposalId);
      event.currentTarget.classList.add('is-dragging');
    }

    function handleDragEnd(event) {
      event.currentTarget.classList.remove('is-dragging');
      dragClickLock = true;
      setTimeout(() => {
        dragClickLock = false;
      }, 180);
    }

    function handleDragOver(event) {
      event.preventDefault();
      event.dataTransfer.dropEffect = 'move';
      event.currentTarget.classList.add('is-over');
    }

    function handleDragLeave(event) {
      event.currentTarget.classList.remove('is-over');
    }

    async function handleDrop(event) {
      event.preventDefault();
      event.currentTarget.classList.remove('is-over');

      const proposalId = event.dataTransfer.getData('text/plain');
      const dateKey = event.currentTarget.dataset.date;
      if (!proposalId || !dateKey) return;

      await scheduleProposal(proposalId, dateKey);
    }

    function scheduledAtForDrop(proposalId, dateKey) {
      const proposal = scheduledItems.find(item => item.id === proposalId);
      const existingScheduledAt = proposal?.scheduled_at || '';
      const timeMatch = existingScheduledAt.match(/T(\d{2}:\d{2})/);
      const time = timeMatch ? timeMatch[1] : '09:00';
      return `${dateKey}T${time}:00`;
    }

    async function scheduleProposal(proposalId, dateKey) {
      const scheduledAt = scheduledAtForDrop(proposalId, dateKey);
      try {
        const response = await CreaCRM.api.apiFetch(SCHEDULE_API, {
          method: 'PATCH',
          body: JSON.stringify({ id: proposalId, scheduled_at: scheduledAt })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'No se pudo reprogramar');
        }
        CreaCRM.ui.showToast('Publicación reprogramada', 'ok');
        await loadScheduled();
      } catch (err) {
        console.error('Error scheduling proposal:', err);
        CreaCRM.ui.showToast(err.message || 'Error reprogramando publicación', 'err');
      }
    }

    function handleProposalClick(event, id) {
      if (dragClickLock) {
        event.preventDefault();
        return;
      }
      editProposal(id);
    }

    function editProposal(id) {
      window.location.href = `/admin/editorial-editor.html?id=${id}&mode=edit`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!CreaCRM.auth.requireAuth()) return;
      loadScheduled();

      document.getElementById('btn-prev-month')?.addEventListener('click', () => {
        calendarMonth.setMonth(calendarMonth.getMonth() - 1);
        renderCalendarGrid(scheduledItems);
      });

      document.getElementById('btn-next-month')?.addEventListener('click', () => {
        calendarMonth.setMonth(calendarMonth.getMonth() + 1);
        renderCalendarGrid(scheduledItems);
      });

      document.getElementById('btn-today')?.addEventListener('click', () => {
        calendarMonth = new Date();
        renderCalendarGrid(scheduledItems);
      });
    });
  </script>
</body>
</html>
