      <a href="/admin/articulos.html" class="dash-nav__link">
        <svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>

  <header class="dash-topbar">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <span class="dash-topbar__title">Gestor: Tercer Tiempo</span>
    </div>
    <div class="dash-topbar__user">
      <a href="/pages/tercer-tiempo.html" target="_blank" class="btn-secondary" style="font-size:0.75rem; text-decoration:none;">Ver sitio público</a>
    </div>
  </header>

  <main class="dash-main">
    <div class="cms-container">
      <div class="cms-header">
        <h2>Contenido de Tercer Tiempo</h2>
        <button class="btn-primary" onclick="saveContent()" style="background:#0A8F6C;">Guardar Cambios</button>
      </div>
      
      <form id="content-form">
        <div style="max-width: 800px;">
          <div class="form-group">
            <label>Título de la Sección</label>
            <input type="text" id="tt-titulo" placeholder="Tercer Tiempo en Vivo">
          </div>
          <div class="form-group">
            <label>Descripción / Bajada</label>
            <textarea id="tt-desc" placeholder="El resumen deportivo de la semana..."></textarea>
          </div>
          <div class="form-group">
            <label>Código Embed de Facebook (Iframe)</label>
            <textarea id="tt-embed" placeholder='<iframe src="https://www.facebook.com/plugins/video.php?href=..." ...></iframe>' style="font-family: monospace;"></textarea>
            <p style="font-size:0.75rem; color:#6b7280; margin-top:0.25rem;">Pega aquí el código iframe que te da Facebook para insertar el video en vivo o grabado.</p>
          </div>
        </div>
      </form>
    </div>
  </main>

  <script src="/admin/js/session-guard.js"></script>
  <script>
    const API = '/api/content/index.php?id=tercer-tiempo';

    async function loadContent() {
      try {
        const res = await fetch(API);
        if (res.ok) {
          const data = await res.json();
          const blocks = data.bloques || {};
          document.getElementById('tt-titulo').value = blocks['tt-titulo'] || '';
          document.getElementById('tt-desc').value = blocks['tt-desc'] || '';
          document.getElementById('tt-embed').value = blocks['tt-embed'] || '';
        }
      } catch (e) {
        console.error('No se pudo cargar el contenido o no existe aún.', e);
      }
    }

    async function saveContent() {
      const payload = {
        blocks: {
          'tt-titulo': document.getElementById('tt-titulo').value,
          'tt-desc': document.getElementById('tt-desc').value,
          'tt-embed': document.getElementById('tt-embed').value
        },
        estado: 'publicada'
      };

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (res.ok) {
          alert('¡Cambios guardados exitosamente!');
        } else {
          alert('Error al guardar. Verifica tu sesión.');
        }
      } catch (e) {
        alert('Error de red al guardar.');
      }
    }

    document.addEventListener('DOMContentLoaded', loadContent);
  </script>
</body>
