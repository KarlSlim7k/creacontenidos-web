server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html index.php;

    # Cache assets
    location /assets/ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, immutable";
    }

    # Page routes (clean URLs)
    location = /nota {
        try_files /pages/nota.html =404;
    }
    location = /seccion {
        try_files /pages/seccion.html =404;
    }
    location = /comunidad {
        try_files /pages/comunidad.html =404;
    }
    location = /comercial {
        try_files /pages/comercial.html =404;
    }
    location = /colaboradores {
        try_files /pages/colaboradores.html =404;
    }
 location = /tercer-tiempo {
        try_files /pages/tercer-tiempo.html =404;
    }
    location = /newsletter {
        try_files /pages/newsletter.html =404;
    }

    # API routes (PHP)
    location /api/ {
        try_files $uri $uri/index.php =404;
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Default: serve files as-is, fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
